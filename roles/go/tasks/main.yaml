---
- name: Install language
  ansible.builtin.package:
    name:
      - go
    state: latest
  become: yes

- name: Install tools
  ansible.builtin.package:
    name:
      - gotestsum
    state: latest
  become: yes

- name: Config folder
  ansible.builtin.file:
    mode: "0755"
    path: "{{ ansible_user_dir }}/Development/language/go"
    state: directory
